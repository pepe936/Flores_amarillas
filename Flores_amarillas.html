<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Árbol de Girasoles · Mensaje de Amor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fff0cf, #fee6b5);
            font-family: 'Segoe UI', 'Quicksand', 'Poppins', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* Contenedor principal: árbol + texto lateral */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            max-width: 1300px;
            width: 100%;
            background: rgba(255, 250, 225, 0.6);
            backdrop-filter: blur(2px);
            border-radius: 2.5rem;
            padding: 1.5rem;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.1);
            border: 1px solid #ffe3aa;
        }

        /* Área del árbol */
        .tree-area {
            flex: 2;
            min-width: 300px;
            display: flex;
            justify-content: center;
            background: #f7eac5;
            border-radius: 1.8rem;
            padding: 0.8rem;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 1.5rem;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
            background: #c9e9ff;
            cursor: pointer;
        }

        /* Área del mensaje lateral */
        .message-area {
            flex: 1;
            min-width: 260px;
            background: rgba(255, 252, 240, 0.95);
            border-radius: 2rem;
            padding: 2rem 1.5rem;
            text-align: center;
            box-shadow: 0 18px 28px rgba(0, 0, 0, 0.1);
            border-left: 10px solid #ffcd7e;
            border-right: 2px solid #ffe0a8;
            transition: transform 0.2s ease;
        }

        .message-area:hover {
            transform: translateY(-5px);
        }

        .flower-deco {
            font-size: 2rem;
            letter-spacing: 8px;
            margin-bottom: 1rem;
        }

        .main-text {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e09d32, #f5b81b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1.3;
            margin: 1rem 0;
        }

        .love-message {
            font-size: 1.5rem;
            font-weight: bold;
            color: #b45f1b;
            background: #fff7e8;
            padding: 1rem;
            border-radius: 1.8rem;
            box-shadow: inset 0 1px 4px #ffdeae, 0 5px 12px rgba(0, 0, 0, 0.05);
            margin: 1rem 0;
        }

        .heart-emoji {
            font-size: 2rem;
            margin: 0.8rem 0;
        }

        @media (max-width: 800px) {
            .container {
                flex-direction: column;
            }
            .main-text {
                font-size: 1.4rem;
            }
            .love-message {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- ÁRBOL EN FORMA DE CORAZÓN LLENO DE GIRASOLES -->
    <div class="tree-area">
        <canvas id="heartCanvas" width="900" height="700" style="max-width:100%; height:auto; aspect-ratio:900/700"></canvas>
    </div>

    <!-- MENSAJE LATERAL -->
    <div class="message-area">
        <div class="flower-deco">
            🌻✨🌻✨🌻
        </div>
        <div class="main-text">
            Feliz Día de las<br>
            flores Amarillas
        </div>
        <div class="love-message">
            💛 mi amor, te amo mucho 💛
        </div>
        <div class="heart-emoji">
            ❤️ 🌻 ❤️
        </div>
        <div style="font-size:0.9rem; color:#a5662a;">
            Eres mi primavera eterna
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- CONFIGURACIÓN DEL ÁRBOL CORAZÓN CON GIRASOLES ----------
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        const width = 900;
        const height = 700;
        canvas.width = width;
        canvas.height = height;

        let heartPolygon = [];
        let sunflowers = [];
        const TOTAL_SUNFLOWERS = 260; // abundantes girasoles

        // 1. Generar polígono del corazón (curva paramétrica)
        function generateHeartPolygon(points = 100) {
            const raw = [];
            for (let i = 0; i <= points; i++) {
                const t = (i / points) * Math.PI * 2;
                const xRaw = 16 * Math.pow(Math.sin(t), 3);
                const yRaw = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
                raw.push({ x: xRaw, y: yRaw });
            }
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            raw.forEach(p => {
                if (p.x < minX) minX = p.x;
                if (p.x > maxX) maxX = p.x;
                if (p.y < minY) minY = p.y;
                if (p.y > maxY) maxY = p.y;
            });
            const origW = maxX - minX;
            const targetWidth = width * 0.7;
            const scale = targetWidth / origW;
            const offsetX = width / 2;
            const desiredBottomY = height * 0.55;
            const offsetY = desiredBottomY - (maxY * scale);
            
            return raw.map(p => ({
                x: offsetX + p.x * scale,
                y: offsetY + p.y * scale
            }));
        }

        // 2. Verificar si un punto está dentro del polígono
        function pointInPolygon(px, py, polygon) {
            let inside = false;
            for (let i = 0, j = polygon.length-1; i < polygon.length; j = i++) {
                const xi = polygon[i].x, yi = polygon[i].y;
                const xj = polygon[j].x, yj = polygon[j].y;
                const intersect = ((yi > py) != (yj > py)) &&
                    (px < (xj - xi) * (py - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        // 3. Generar girasoles dentro del corazón
        function generateSunflowers(polygon, count) {
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            polygon.forEach(p => {
                if (p.x < minX) minX = p.x;
                if (p.x > maxX) maxX = p.x;
                if (p.y < minY) minY = p.y;
                if (p.y > maxY) maxY = p.y;
            });
            const positions = [];
            let attempts = 0;
            const maxAttempts = 10000;
            while (positions.length < count && attempts < maxAttempts) {
                const x = minX + Math.random() * (maxX - minX);
                const y = minY + Math.random() * (maxY - minY);
                if (pointInPolygon(x, y, polygon)) {
                    const radius = 10 + Math.random() * 14;
                    positions.push({ x, y, radius });
                }
                attempts++;
            }
            return positions;
        }

        // 4. Dibujar un girasol
        function drawSunflower(cx, cy, radius) {
            const petalCount = 12;
            const centerR = radius * 0.38;
            const petalLen = radius * 0.9;
            const petalW = radius * 0.45;
            
            // Pétalos externos
            for (let i = 0; i < petalCount; i++) {
                const angle = (i / petalCount) * Math.PI * 2;
                const px = cx + Math.cos(angle) * (centerR + petalLen * 0.55);
                const py = cy + Math.sin(angle) * (centerR + petalLen * 0.55);
                ctx.save();
                ctx.translate(px, py);
                ctx.rotate(angle);
                ctx.beginPath();
                ctx.ellipse(0, 0, petalW, petalLen * 0.7, 0, 0, Math.PI * 2);
                ctx.fillStyle = '#FFD966';
                ctx.fill();
                ctx.restore();
            }
            // Pétalos internos
            for (let i = 0; i < petalCount; i++) {
                const angle = (i / petalCount) * Math.PI * 2 + 0.3;
                const px = cx + Math.cos(angle) * (centerR + petalLen * 0.35);
                const py = cy + Math.sin(angle) * (centerR + petalLen * 0.35);
                ctx.save();
                ctx.translate(px, py);
                ctx.rotate(angle);
                ctx.beginPath();
                ctx.ellipse(0, 0, petalW * 0.7, petalLen * 0.55, 0, 0, Math.PI * 2);
                ctx.fillStyle = '#FFC107';
                ctx.fill();
                ctx.restore();
            }
            // Centro
            ctx.beginPath();
            ctx.arc(cx, cy, centerR, 0, Math.PI * 2);
            ctx.fillStyle = '#6B3E1A';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx, cy, centerR * 0.6, 0, Math.PI * 2);
            ctx.fillStyle = '#8B5A2B';
            ctx.fill();
            // Semillas
            ctx.fillStyle = '#4A2A0C';
            for (let s = 0; s < 14; s++) {
                const ang = Math.random() * Math.PI * 2;
                const rad = Math.random() * centerR * 0.7;
                const sx = cx + Math.cos(ang) * rad;
                const sy = cy + Math.sin(ang) * rad;
                ctx.beginPath();
                ctx.arc(sx, sy, centerR * 0.12, 0, Math.PI * 2);
                ctx.fill();
            }
            // Brillo
            ctx.beginPath();
            ctx.arc(cx - centerR * 0.2, cy - centerR * 0.2, centerR * 0.2, 0, Math.PI * 2);
            ctx.fillStyle = '#E0B05E';
            ctx.globalAlpha = 0.4;
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        // 5. Dibujar tronco y ramas
        function drawTrunk(baseY) {
            const trunkWidth = 55;
            const trunkHeight = 95;
            const trunkX = width/2 - trunkWidth/2;
            const trunkY = baseY - 5;
            ctx.fillStyle = '#7A4C2C';
            ctx.shadowBlur = 4;
            ctx.fillRect(trunkX, trunkY, trunkWidth, trunkHeight);
            ctx.fillStyle = '#5A3A1E';
            ctx.fillRect(trunkX + trunkWidth*0.2, trunkY-5, trunkWidth*0.6, trunkHeight*0.25);
            ctx.fillStyle = '#9B6A3E';
            for (let i=0; i<12; i++) {
                ctx.beginPath();
                ctx.moveTo(trunkX+5 + i*8, trunkY+trunkHeight*0.3);
                ctx.lineTo(trunkX+10 + i*6, trunkY+trunkHeight*0.6);
                ctx.lineTo(trunkX+2 + i*7, trunkY+trunkHeight*0.9);
                ctx.fill();
            }
            // Ramas curvas
            ctx.beginPath();
            ctx.moveTo(trunkX+trunkWidth*0.3, trunkY-8);
            ctx.quadraticCurveTo(trunkX+trunkWidth*0.1, trunkY-45, trunkX+trunkWidth*0.5, trunkY-55);
            ctx.lineTo(trunkX+trunkWidth*0.55, trunkY-40);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(trunkX+trunkWidth*0.7, trunkY-12);
            ctx.quadraticCurveTo(trunkX+trunkWidth*0.85, trunkY-50, trunkX+trunkWidth*0.5, trunkY-60);
            ctx.lineTo(trunkX+trunkWidth*0.45, trunkY-45);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // 6. Fondo (cielo, nubes, pasto)
        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, 0, height*0.7);
            grad.addColorStop(0, '#FFE6B5');
            grad.addColorStop(0.6, '#F7DC8C');
            grad.addColorStop(1, '#E7C876');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = '#FFF7E8';
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.ellipse(120, 70, 60, 45, 0, 0, Math.PI*2);
            ctx.ellipse(190, 60, 50, 40, 0, 0, Math.PI*2);
            ctx.ellipse(70, 90, 45, 40, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(720, 100, 65, 50, 0, 0, Math.PI*2);
            ctx.ellipse(790, 85, 55, 45, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#86BF4C';
            ctx.fillRect(0, height-130, width, 140);
            ctx.fillStyle = '#6AA53A';
            for (let i=0; i<180; i++) {
                ctx.beginPath();
                ctx.moveTo(i*20, height-125);
                ctx.lineTo(i*20+7, height-148);
                ctx.lineTo(i*20-7, height-148);
                ctx.fill();
            }
        }

        // 7. Dibujar todo el árbol
        function drawTree() {
            drawBackground();
            let lowestY = -Infinity;
            heartPolygon.forEach(p => { if (p.y > lowestY) lowestY = p.y; });
            drawTrunk(lowestY);
            for (let f of sunflowers) {
                drawSunflower(f.x, f.y, f.radius);
            }
            // Borde decorativo del corazón
            ctx.beginPath();
            ctx.moveTo(heartPolygon[0].x, heartPolygon[0].y);
            for (let i=1; i<heartPolygon.length; i++) {
                ctx.lineTo(heartPolygon[i].x, heartPolygon[i].y);
            }
            ctx.closePath();
            ctx.strokeStyle = '#F9C851';
            ctx.lineWidth = 2.2;
            ctx.shadowBlur = 2;
            ctx.stroke();
            ctx.strokeStyle = '#FFE0A3';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.shadowBlur = 0;
            // Hojitas decorativas
            for (let i=0; i<100; i++) {
                if (Math.random() > 0.75) {
                    const f = sunflowers[Math.floor(Math.random() * sunflowers.length)];
                    if (f) {
                        ctx.beginPath();
                        ctx.moveTo(f.x-4, f.y-3);
                        ctx.quadraticCurveTo(f.x-2, f.y-10, f.x+3, f.y-5);
                        ctx.fillStyle = '#77B84A';
                        ctx.fill();
                    }
                }
            }
        }

        // Inicializar todo
        heartPolygon = generateHeartPolygon(100);
        sunflowers = generateSunflowers(heartPolygon, TOTAL_SUNFLOWERS);
        drawTree();

        // Opcional: redibujar periódicamente para mantenerlo impecable
        setInterval(() => drawTree(), 200);
    })();
</script>
</body>
</html>
